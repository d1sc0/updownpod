<!doctype html>
<html lang="en">

<head>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <meta name="robots" content="noindex" />
 <title>Content Manager</title>
 <script>
  // This MUST be set before the Decap CMS script loads to prevent auto-initialization
  window.CMS_MANUAL_INIT = true;
 </script>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</head>

<body>
 <div id="nc-root"></div>
 <script>
  (async function () {
   try {
    // 1. Fetch and parse config.yml
    const response = await fetch('/admin/config.yml');
    if (!response.ok) throw new Error('config.yml not found');
    const configText = await response.text();
    const config = jsyaml.load(configText);

    console.log('ADMIN_DEBUG: Fetched and parsed YAML successfully:', config);

    // 2. Prevent Decap from re-fetching config.yml (fixes unique collection name errors)
    config.load_config_file = false;
    window.CMS_CONFIG = config;

    // 3. Setup handshake listener
    window.addEventListener('message', (e) => {
     if (typeof e.data === 'string' && e.data.startsWith('authorization:github:success:')) {
      console.log('ADMIN_DEBUG: Handshake message received');
     }
    }, false);

    // 4. Load the CMS script
    const script = document.createElement('script');
    script.src = "https://unpkg.com/decap-cms@^3.10.12/dist/decap-cms.js";
    script.onload = () => {
     if (window.CMS && !window.CMS_INITIALIZED) {
      window.CMS_INITIALIZED = true;

      // Initialize with the verified config object
      console.log('ADMIN_DEBUG: Calling CMS.init(config)...');
      window.CMS.init({ config });

      // Verification: Check if Decap processed the config
      setTimeout(() => {
       const backend = window.CMS.getBackend();
       console.log('ADMIN_DEBUG: Checking CMS initialization status...');

       if (backend) {
        console.log('ADMIN_DEBUG: [SUCCESS] Backend initialized:', backend.constructor.name);
        console.log('ADMIN_DEBUG: Backend instance:', backend);
       } else {
        console.error('ADMIN_DEBUG: [FAILURE] Backend is null. The config was likely rejected by Decap.');

        // Safely check internal state if possible
        if (typeof window.CMS.getStore === 'function') {
         try {
          const state = window.CMS.getStore().getState();
          console.log('ADMIN_DEBUG: Internal Redux Config State:', state.config.toJS());
         } catch (e) {
          console.error('ADMIN_DEBUG: Could not retrieve internal state:', e.message);
         }
        } else {
         console.warn('ADMIN_DEBUG: window.CMS.getStore is not available on this version.');
        }

        console.log('ADMIN_DEBUG: Re-verify this was the object passed:', config);
       }
      }, 2000);
     }
    };
    document.body.appendChild(script);
   } catch (err) {
    console.error('ADMIN_DEBUG Init Error:', err.message);
   }
  })();
 </script>
</body>

</html>
