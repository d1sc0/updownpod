<!doctype html>
<html lang="en">

<head>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <meta name="robots" content="noindex" />
 <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
 <title>Content Manager</title>
</head>

<body>
 <div id="nc-root"></div>
 <script>
  window.CMS_MANUAL_INIT = true;
 </script>
 <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
 <script>
  // Keep the debug listener to monitor the handshake
  window.addEventListener('message', (e) => {
   if (typeof e.data === 'string' && e.data.startsWith('authorization:github:success:')) {
    console.log('ADMIN_DEBUG: Received Auth Message:', e.data);
   }
  }, false);

  if (window.CMS) {
   window.CMS.init();
   console.log('ADMIN_DEBUG: CMS Manually Initialized');
  }
 </script>
</body>

</html>
