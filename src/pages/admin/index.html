<!doctype html>
<html lang="en">

<head>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <meta name="robots" content="noindex" />
 <title>Content Manager</title>
 <script>
  // This MUST be set before the Decap CMS script loads to prevent auto-initialization
  window.CMS_MANUAL_INIT = true;
 </script>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</head>

<body>
 <div id="nc-root"></div>
 <script>
  (async function () {
   try {
    // 1. Fetch config first
    const response = await fetch('/admin/config.yml');
    if (!response.ok) throw new Error(`config.yml not found: ${response.status}`);
    const configText = await response.text();

    // 2. Parse the config object
    const config = jsyaml.load(configText);
    window.CMS_CONFIG = config; // Keep as global fallback

    // 3. Setup handshake listener
    window.addEventListener('message', (e) => {
     if (typeof e.data === 'string' && e.data.startsWith('authorization:github:success:')) {
      console.log('ADMIN_DEBUG: Handshake received');
     }
    }, false);

    // 4. Dynamically load Decap CMS script
    const script = document.createElement('script');
    script.src = "https://unpkg.com/decap-cms@^3.10.12/dist/decap-cms.js";
    script.onload = () => {
     // If we set window.CMS_CONFIG, we call init() without arguments
     // to trigger the manual start using that global object.
     if (window.CMS && !window.CMS_INITIALIZED) {
      window.CMS_INITIALIZED = true;
      window.CMS.init({ config });
      console.log('ADMIN_DEBUG: CMS Initialized');
     }
    };
    document.body.appendChild(script);
   } catch (err) {
    console.error('ADMIN_DEBUG Init Error:', err.message);
   }
  })();
 </script>
</body>

</html>
