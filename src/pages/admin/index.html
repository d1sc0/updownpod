<!doctype html>
<html lang="en">

<head>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <meta name="robots" content="noindex" />
 <title>Content Manager</title>
 <script>
  // This MUST be set before the Decap CMS script loads to prevent auto-initialization
  window.CMS_MANUAL_INIT = true;
 </script>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</head>

<body>
 <div id="nc-root"></div>
 <script>
  (async function () {
   try {
    // 1. Fetch and parse config.yml
    const response = await fetch('/admin/config.yml');
    if (!response.ok) throw new Error('config.yml not found');
    const configText = await response.text();
    const config = jsyaml.load(configText);

    // 2. Prevent Decap from re-fetching config.yml (fixes unique collection name errors)
    config.load_config_file = false;
    window.CMS_CONFIG = config;

    // 3. Setup handshake listener
    window.addEventListener('message', (e) => {
     if (typeof e.data === 'string' && e.data.startsWith('authorization:github:success:')) {
      console.log('ADMIN_DEBUG: Handshake message received');
     }
    }, false);

    // 4. Load the CMS script
    const script = document.createElement('script');
    script.src = "https://unpkg.com/decap-cms@^3.10.12/dist/decap-cms.js";
    script.onload = () => {
     if (window.CMS && !window.CMS_INITIALIZED) {
      window.CMS_INITIALIZED = true;

      // Initialize with the verified config object
      window.CMS.init({ config });
      console.log('ADMIN_DEBUG: CMS Initialized');

      // Verification: Check if the backend is actually ready
      setTimeout(() => {
       const backend = window.CMS.getBackend();
       if (backend) {
        console.log('ADMIN_DEBUG: Backend success:', backend.constructor.name);
       } else {
        console.error('ADMIN_DEBUG: Backend failed to initialize. Inspect config state below.');
        console.log('ADMIN_DEBUG: Internal Config:', window.CMS.getStore().getState().config.toJS());
       }
      }, 2000);
     }
    };
    document.body.appendChild(script);
   } catch (err) {
    console.error('ADMIN_DEBUG Init Error:', err.message);
   }
  })();
 </script>
</body>

</html>
