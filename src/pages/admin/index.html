<!doctype html>
<html lang="en">

<head>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <meta name="robots" content="noindex" />
 <title>Content Manager</title>
 <script>
  // This MUST be set before the Decap CMS script loads to prevent auto-initialization
  window.CMS_MANUAL_INIT = true;
 </script>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</head>

<body>
 <div id="nc-root"></div>
 <script>
  (async () => {
   try {
    // 1. Fetch and parse config first
    const response = await fetch('config.yml');
    if (!response.ok) throw new Error('config.yml not found');
    const configText = await response.text();
    const config = jsyaml.load(configText);

    // 2. Setup handshake listener
    window.addEventListener('message', (e) => {
     if (typeof e.data === 'string' && e.data.startsWith('authorization:github:success:')) {
      console.log('ADMIN_DEBUG: OAuth handshake message received');
     }
    }, false);

    // 3. Dynamically load Decap CMS script
    const script = document.createElement('script');
    script.src = "https://unpkg.com/decap-cms@^3.10.12/dist/decap-cms.js";
    script.onload = () => {
     if (window.CMS) {
      window.CMS.init({ config });
      console.log('ADMIN_DEBUG: CMS Initialized with manual configuration');
     }
    };
    document.body.appendChild(script);
   } catch (err) {
    console.error('ADMIN_DEBUG Error:', err.message);
   }
  })();
 </script>
</body>

</html>
