<!doctype html>
<html lang="en">

<head>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <meta name="robots" content="noindex" />
 <title>Content Manager</title>
 <script>
  // This MUST be set before the Decap CMS script loads to prevent auto-initialization
  window.CMS_MANUAL_INIT = true;
 </script>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</head>

<body>
 <div id="nc-root"></div>
 <script>
  (async function () {
   try {
    // 1. Fetch and parse config before the CMS loads
    const response = await fetch('/admin/config.yml');
    if (!response.ok) throw new Error('config.yml not found');
    const configText = await response.text();

    // Set the global config object. Decap CMS v3 checks for this during startup.
    window.CMS_CONFIG = jsyaml.load(configText);
    // Ensure the config explicitly tells Decap not to load config.yml again
    window.CMS_CONFIG.load_config_file = false;

    console.log('ADMIN_DEBUG: Decap Config Object:', window.CMS_CONFIG);

    // 2. Setup handshake listener for debugging
    window.addEventListener('message', (e) => {
     if (typeof e.data === 'string' && e.data.startsWith('authorization:github:success:')) {
      console.log('ADMIN_DEBUG: Handshake received from popup');
     }
    }, false);

    // 3. Dynamically load Decap CMS script AFTER config is ready
    const script = document.createElement('script');
    script.src = "https://unpkg.com/decap-cms@^3.10.12/dist/decap-cms.js";
    script.onload = () => {
     if (window.CMS && !window.CMS_HAS_INIT) {
      window.CMS_HAS_INIT = true;
      console.log('ADMIN_DEBUG: Calling CMS.init() with config.backend:', window.CMS_CONFIG.backend); // Added log
      window.CMS.init({ config: window.CMS_CONFIG }); // Pass the config explicitly

      console.log('ADMIN_DEBUG: CMS.init() called.');

      // Diagnostic: Check if localStorage is working
      try {
       localStorage.setItem('debug_test', 'working');
       console.log('ADMIN_DEBUG: localStorage test:', localStorage.getItem('debug_test'));
       localStorage.removeItem('debug_test');
      } catch (e) {
       console.error('ADMIN_DEBUG: localStorage is BLOCKED or full:', e.message);
      }

      // Interrogate the backend after a short delay to allow internal setup
      setTimeout(() => { // Increased timeout for backend initialization
       const backend = window.CMS.getBackend();
       if (backend) {
        console.log('ADMIN_DEBUG: Backend identified as:', backend.constructor.name);
        // Check internal configuration
        const authEndpoint = window.CMS_CONFIG.backend.auth_endpoint;
        const baseUrl = window.CMS_CONFIG.backend.base_url;
        console.log(`ADMIN_DEBUG: Auth should hit: ${baseUrl}${authEndpoint}`);
       } else {
        console.warn('ADMIN_DEBUG: Backend not yet initialized.');
       }
      }, 3000); // Increased to 3 seconds
     }
    };
    document.body.appendChild(script);
   } catch (err) {
    console.error('ADMIN_DEBUG Error:', err.message);
   }
  })();
 </script>
</body>

</html>
