<!doctype html>
<html lang="en">

<head>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <meta name="robots" content="noindex" />
 <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />
 <title>Content Manager</title>
</head>

<body>
 <div id="nc-root"></div>
 <script>
  window.CMS_MANUAL_INIT = true;
 </script>
 <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
 <script>
  (async () => {
   // 1. Fetch the config manually to ensure it's loaded before init
   const response = await fetch('/admin/config.yml');
   const configText = await response.text();

   // 2. Add debug listener
   window.addEventListener('message', (e) => {
    if (typeof e.data === 'string' && e.data.startsWith('authorization:github:success:')) {
     console.log('ADMIN_DEBUG: Received Auth Message:', e.data);
    }
   }, false);

   // 3. Initialize CMS with the explicit config string
   // This ensures Decap CMS enters the correct state for OAuth
   if (window.CMS) {
    window.CMS.init({
     config: window.jsyaml.load(configText)
    });
    console.log('ADMIN_DEBUG: CMS Initialized with explicit config');
   }
  })();
 </script>
 <!-- Include js-yaml to parse the config before passing to Decap -->
 <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</body>

</html>
