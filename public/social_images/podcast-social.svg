<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Upstairs Downstairs Podcast social image">
  <defs>
    <style>
      .graphite { fill: #2b2b2b; }
      .cream { fill: #fffccc; }
      .green { fill: #a1fe4f; }
      .blush { fill: #ffb2e6; }
      .blue { fill: #015eff; }
      .white { fill: #ffffff; }
      .stroke-graphite { stroke: #2b2b2b; stroke-width: 8; }
      .title {
        font-family: "Jersey 15", "Bungee", "Impact", "Arial Black", sans-serif;
        font-weight: 400;
        letter-spacing: 1px;
      }
      .sans {
        font-family: "Helvetica Neue", "Avenir Next", "Segoe UI", sans-serif;
      }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#b1e9ff" stroke-width="1.5"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="1200" height="630" class="cream"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#grid)" opacity="0.55"/>

  <circle cx="1060" cy="118" r="76" class="blue" opacity="0.9"/>
  <circle cx="138" cy="548" r="88" class="green" opacity="0.85"/>
  <rect x="884" y="474" width="210" height="112" rx="22" class="blush" transform="rotate(-8 989 530)"/>

  <rect x="90" y="74" width="976" height="454" rx="18" class="blush stroke-graphite"/>

  <rect x="118" y="112" width="924" height="92" rx="14" class="green stroke-graphite"/>
  <text x="580" y="176" text-anchor="middle" class="title graphite" font-size="54">
    UPSTAIRS / DOWNSTAIRS
  </text>

  <g transform="translate(418 248)">
    <rect x="0" y="28" width="16" height="28" class="graphite"/>
    <rect x="28" y="12" width="16" height="60" class="graphite"/>
    <rect x="56" y="0" width="16" height="84" class="graphite"/>
    <rect x="84" y="16" width="16" height="52" class="graphite"/>
    <rect x="112" y="0" width="16" height="84" class="graphite"/>
    <rect x="140" y="10" width="16" height="64" class="graphite"/>
    <rect x="168" y="32" width="16" height="20" class="graphite"/>
    <rect x="196" y="8" width="16" height="68" class="graphite"/>
    <rect x="224" y="0" width="16" height="84" class="graphite"/>
    <rect x="252" y="16" width="16" height="52" class="graphite"/>
    <rect x="280" y="2" width="16" height="80" class="graphite"/>
    <rect x="308" y="20" width="16" height="44" class="graphite"/>
  </g>

  <rect x="184" y="378" width="792" height="112" rx="14" class="white stroke-graphite"/>
  <text x="580" y="451" text-anchor="middle" class="title blue" font-size="88">PODCAST</text>
  <text x="580" y="478" text-anchor="middle" class="sans graphite" font-size="24" font-weight="800">
    UPDOWNPOD.COM
  </text>
</svg>
